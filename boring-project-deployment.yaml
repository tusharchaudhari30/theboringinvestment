---
apiVersion: v1
kind: Namespace
metadata:
  name: boring-project
  annotations:
    linkerd.io/inject: enabled

# Secret for postgres credentials
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: boring-project
type: Opaque
stringData:
  username: portfolio_service
  password: portfolio_service

# PVC for postgres
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: boring-project
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

# PVC for redis
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-pvc
  namespace: boring-project
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 512Mi

# Frontend (React via Nginx)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontendpersonalfin
  namespace: boring-project
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontendpersonalfin
  template:
    metadata:
      labels:
        app: frontendpersonalfin
    spec:
      containers:
        - name: frontendpersonalfin
          image: localhost:6000/theboringproject-frontendpersonalfin:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: frontendpersonalfin
  namespace: boring-project
spec:
  selector:
    app: frontendpersonalfin
  ports:
    - port: 80
      targetPort: 80

# AuthenticationService
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: authenticationservice
  namespace: boring-project
spec:
  replicas: 1
  selector:
    matchLabels:
      app: authenticationservice
  template:
    metadata:
      labels:
        app: authenticationservice
    spec:
      containers:
        - name: authenticationservice
          image: localhost:6000/theboringproject-authenticationservice:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8081
          env:
            - name: POSTGRES_URL
              value: "postgres:5432"
            - name: REDIS_URL
              value: "redis"
            - name: KAFKA_URL
              value: "kafka:29092"
            - name: AUTHENTICATION_SERVICE_URL
              value: "http://authenticationservice:8081"
            - name: PORTFOLIO_SERVICE_URL
              value: "http://portfolioservice:8082"
            - name: TRANSACTION_SERVICE_URL
              value: "http://transactionservice:8083"
            - name: OTEL_COLLECTOR_URL
              value: "otelcollector:4318"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: password
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: authenticationservice
  namespace: boring-project
spec:
  selector:
    app: authenticationservice
  ports:
    - port: 8081
      targetPort: 8081

