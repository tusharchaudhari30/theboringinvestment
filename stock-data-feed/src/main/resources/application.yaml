server:
  port: 8084
spring:
  application:
    name: stock-data-feed
  kafka:
    bootstrap-servers: ${KAFKA_URL:localhost:9092}
    topic:
      name: stock-prices
      partitions: 1
      replication-factor: 1
      retention-ms: 2000 # Messages expire after 5 seconds
      cleanup-policy: delete # Delete messages instead of compacting
      segment-bytes: 1048576
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
redis:
  url: redis://${REDIS_URL:localhost:6379}
rabbitmq:
  url: amqp://${RABBITMQ_URL:localhost:5672}

management:
  tracing:
    sampling:
      probability: 1.0
    propagation:
      type: W3C
  otlp:
    tracing:
      endpoint: http://${OTEL_COLLECTOR_URL:otelcollector:4318}/v1/traces
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"
